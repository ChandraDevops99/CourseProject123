name: Django CI/CD with Docker

# Trigger workflow on push or pull request to main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: MyNewPassword123
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    # Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Set up Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: 3.11 

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Wait for MySQL service to be ready
    - name: Wait for MySQL
      run: |
        for i in {1..30}; do
          mysqladmin ping -h127.0.0.1 -uroot -pMyNewPassword123 && break
          echo "Waiting for MySQL..."
          sleep 2
        done

    # Step 5: Run migrations
    - name: Run Django migrations
      env:
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_NAME: testdb
        DB_USER: root
        DB_PASSWORD: MyNewPassword123
      run: |
        python manage.py migrate

    # Step 6: Run Django tests
    - name: Run tests
      run: |
        python manage.py test

    # Step 7: Build Docker image
    - name: Build Docker image
      run: |
        docker build -t courseproject-web .

    # Step 8: Log in to Docker Hub (set secrets in repo)
    - name: Docker login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 9: Push Docker image
    - name: Push Docker image
      run: |
        docker tag courseproject-web ${{ secrets.DOCKER_USERNAME }}/courseproject-web:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/courseproject-web:latest