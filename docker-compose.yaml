services:
  course-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: course_db
    ports:
      - "3306:3306"   

  course-web:
    build: .
    depends_on:
      - course-db
    environment:
      DB_HOST: course-db
      DB_USER: root
      DB_PASSWORD: rootpassword